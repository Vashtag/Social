<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anatomy Unscramble</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #242424;
      --text: #f0ece4;
      --muted: #555;
      --hint1: #777;
      --hint2: #c8c0b4;
      --correct-bg: #0f2010;
      --correct-border: #2a5c2a;
      --correct-text: #74d874;
      --warn: #d4a84b;
      --danger: #c95454;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Screens ── */
    .screen {
      display: none;
      min-height: 100dvh;
      width: 100%;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      z-index: 2;
    }
    .screen.active { display: flex; }

    /* Game + result screens need solid bg to cover the intro underneath */
    #game-screen, #result-screen { background: var(--bg); }

    /* ── Setup ── */
    #setup-screen { flex-direction: column; background: transparent; }

    .setup-inner {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      background: rgba(13,13,13,0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 2.5rem 2rem;
    }

    .logo {
      text-align: center;
    }
    .logo-title {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .logo-sub {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .mode-buttons {
      display: flex;
      gap: 0.75rem;
      width: 100%;
    }
    .btn-mode {
      flex: 1;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-mode:hover { border-color: #444; color: var(--text); }
    .btn-mode.selected {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .round-selector {
      width: 100%;
      display: none;
    }
    .round-selector.show { display: block; }
    .round-selector-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .round-btns {
      display: flex;
      gap: 0.5rem;
    }
    .btn-rounds {
      flex: 1;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-rounds:hover { border-color: #444; color: var(--text); }
    .btn-rounds.selected { background: var(--text); color: var(--bg); border-color: var(--text); }

    .fields {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .field-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      color: var(--text);
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #444; }
    input[type="text"]::placeholder { color: #3a3a3a; }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }

    /* Fade-to-black overlay for screen transitions */
    #fade-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #fade-overlay.fading { opacity: 1; pointer-events: all; }

    /* ── Game ── */
    #game-screen { flex-direction: column; align-items: stretch; padding: 0; }

    .game-inner {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1.5rem 1.5rem;
      gap: 0;
    }

    /* ── Wide layout (desktop) ── */
    @media (min-width: 700px) {
      .game-inner {
        max-width: 1100px;
        padding: 1.5rem 3rem 2rem;
      }
      .action-buttons {
        flex-direction: row;
        align-items: stretch;
      }
      #btn-p1   { order: 1; flex: 1; }
      #btn-skip { order: 2; flex: 0 0 auto; padding: 0.7rem 2.5rem; align-self: center; }
      #btn-p2   { order: 3; flex: 1; }
      .scrambled {
        font-size: clamp(3rem, 6vw, 6rem);
      }
      .word-area { gap: 1.5rem; }
    }

    /* Scoreboard */
    .scoreboard {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.5rem;
      flex-shrink: 0;
    }

    .player-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      min-width: 80px;
    }
    .player-col .name {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .player-col .pts {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
    }

    .center-col {
      text-align: center;
    }
    .round-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    /* Word area */
    .word-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 0;
    }

    /* Timer ring */
    .timer-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      flex-shrink: 0;
    }
    .timer-wrap svg {
      width: 96px;
      height: 96px;
      transform: rotate(-90deg);
    }
    .ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 5;
    }
    .ring-fg {
      fill: none;
      stroke: var(--text);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 271;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.9s linear, stroke 0.4s ease;
    }
    .timer-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    /* Scrambled word */
    .scrambled {
      font-size: clamp(2.2rem, 9vw, 4.2rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 1.15;
      word-break: break-word;
    }

    /* Hint */
    .hint-area {
      height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint-text {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0;
      padding: 0.4rem 1.1rem;
      border-radius: 100px;
      position: relative;
      background: var(--bg);
      z-index: 0;
    }
    .hint-text.show { opacity: 1; }
    .hint-text.specific { color: var(--text); }

    /* Soft colour-shifting glow under the text */
    @keyframes hint-glow {
      0%   { text-shadow: 0 2px 10px rgba(150, 200, 255, 0.5); }
      33%  { text-shadow: 0 2px 12px rgba(200, 150, 255, 0.5); }
      66%  { text-shadow: 0 2px 12px rgba(255, 200, 120, 0.5); }
      100% { text-shadow: 0 2px 10px rgba(150, 200, 255, 0.5); }
    }

    /* Appear animation */
    @keyframes hint-appear {
      0%   { opacity: 0; transform: scale(0.88); }
      55%  { opacity: 1; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }

    .hint-text.flash {
      animation: hint-appear 0.4s ease-out forwards,
                 hint-glow 3s ease-in-out 0.4s infinite;
    }

    /* Buttons */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      flex-shrink: 0;
    }

    .btn-point {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.05rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }
    .btn-point:hover { background: #1e1e1e; border-color: #333; }
    .btn-point:active { transform: scale(0.985); }
    .btn-point.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      color: var(--correct-text);
    }
    .btn-point:disabled { opacity: 0.35; cursor: default; }

    .btn-skip {
      background: transparent;
      color: var(--muted);
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 0.7rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-skip:hover { color: #888; border-color: #333; }
    .btn-skip:disabled { opacity: 0.2; cursor: default; }

    /* ── Result ── */
    #result-screen { flex-direction: column; }

    .result-inner {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      text-align: center;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .result-winner {
      font-size: clamp(2.2rem, 8vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .final-scores {
      display: flex;
      gap: 4rem;
    }
    .final-player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .final-player .fname {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .final-player .fpts {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
    }

    .divider {
      width: 1px;
      height: 60px;
      background: var(--border);
      align-self: center;
    }

    .speed-stat {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .speed-stat span {
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0;
      font-size: 1rem;
    }

    /* Photo modal */
    .photo-modal {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .photo-modal.visible { display: flex; }
    #photo-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .photo-overlay-ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      pointer-events: none;
    }
    .photo-results {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .photo-results .photo-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .photo-results .photo-winner {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }
    .photo-results .photo-scores {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-top: 0.3rem;
      letter-spacing: 0.05em;
    }
    .photo-results .photo-speed {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 0.3rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .photo-actions {
      display: flex;
      gap: 0.75rem;
      pointer-events: all;
    }
    .btn-capture {
      flex: 1;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-close-photo {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* Answer reveal */
    .answer-reveal {
      font-size: clamp(2.2rem, 9vw, 4.2rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.15;
      word-break: break-word;
      color: var(--correct-text);
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 0.3s ease, transform 0.3s ease;
      position: absolute;
      width: 100%;
      pointer-events: none;
    }
    .answer-reveal.show {
      opacity: 1;
      transform: scale(1);
    }
    .answer-reveal.missed {
      color: var(--danger);
    }
    .word-slot {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: clamp(2.8rem, 10vw, 5rem);
      width: 100%;
    }

    /* Preview overlay */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .preview-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .preview-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .preview-words {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .preview-word {
      font-size: clamp(1.6rem, 6vw, 2.8rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .preview-word.show {
      opacity: 1;
      transform: translateY(0);
    }
    .countdown-num {
      font-size: 6rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .countdown-num.show {
      opacity: 1;
      transform: scale(1);
    }
    .countdown-num.hide {
      opacity: 0;
      transform: scale(1.3);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* Pulse on correct */
    @keyframes correct-pulse {
      0% { opacity: 0.12; }
      50% { opacity: 0.22; }
      100% { opacity: 0; }
    }
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: #4caf50;
      pointer-events: none;
      opacity: 0;
      border-radius: 0;
    }
    .flash-overlay.go {
      animation: correct-pulse 0.5s ease-out forwards;
    }
    /* Record button */
    .record-btn {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 100;
    }


    /* Intro overlay — always-on background behind setup screen */
    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      overflow: hidden;
    }
    .intro-overlay.visible { opacity: 1; }

    .intro-bg-gradient {
      position: absolute;
      inset: 0;
      background: #080808;
      z-index: 0;
    }

    .intro-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orb-drift 4s ease-in-out infinite alternate;
    }
    @keyframes orb-drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -20px) scale(1.15); }
    }

    .intro-word-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 0;
    }
    .intro-letter {
      display: inline-block;
      /* font sized to fit 10 chars across ~9/16 of viewport height */
      font-size: clamp(1.8rem, min(8vw, 4.5vh), 5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.01em;
      opacity: 0;
    }
    .intro-letter.animate {
      animation: letter-appear 0.25s ease-out forwards;
    }
    @keyframes letter-appear {
      0%   { opacity: 0; transform: scale(0.85); }
      100% { opacity: 1; transform: scale(1); }
    }

    .intro-sub {
      position: relative;
      z-index: 1;
      font-size: clamp(0.7rem, 2.5vw, 0.95rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .intro-sub.show { opacity: 1; transform: translateY(0); }


    .record-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.55rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .record-btn:hover { border-color: #444; color: var(--text); }
    .record-btn.recording {
      border-color: var(--danger);
      color: var(--danger);
      background: #1a0a0a;
    }
    .record-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .record-btn.recording .record-dot {
      background: var(--danger);
      animation: rec-pulse 1.1s ease-in-out infinite;
    }
    @keyframes rec-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>

<!-- Flash overlay -->
<div class="flash-overlay" id="flash"></div>

<!-- Intro overlay -->
<div class="intro-overlay" id="intro-overlay">
  <div class="intro-bg-gradient">
    <div class="intro-orb" style="width:420px;height:420px;background:#7c3aed;opacity:0.35;top:-80px;left:-100px;animation-delay:0s;"></div>
    <div class="intro-orb" style="width:360px;height:360px;background:#db2777;opacity:0.3;bottom:-60px;right:-80px;animation-delay:-1.5s;"></div>
    <div class="intro-orb" style="width:280px;height:280px;background:#0ea5e9;opacity:0.25;bottom:20%;left:30%;animation-delay:-0.8s;animation-duration:5s;"></div>
    <div class="intro-orb" style="width:200px;height:200px;background:#f59e0b;opacity:0.2;top:15%;right:20%;animation-delay:-2s;animation-duration:3.5s;"></div>
  </div>
  <div class="intro-word-wrap" id="intro-word-wrap"></div>
  <div class="intro-sub" id="intro-sub">Anatomy Edition</div>
</div>


<!-- Fade-to-black overlay -->
<div id="fade-overlay"></div>

<!-- Record button (always visible) -->
<button class="record-btn" id="record-btn" onclick="toggleRecord()">
  <div class="record-dot"></div>
  <span id="record-label">Record</span>
</button>

<!-- ── Setup Screen ── -->
<div class="screen active" id="setup-screen">
  <div class="setup-inner">
    <div class="logo">
      <div class="logo-title">Unscramble</div>

<script>
  // ── Word bank ──────────────────────────────────────────────
  const WORDS = [
    { word: "coracoid",           hint1: "Bone",      hint2: "Upper limb bone process" },
    { word: "acromion",           hint1: "Bone",      hint2: "Scapula landmark" },
    { word: "olecranon",          hint1: "Bone",      hint2: "Posterior elbow process" },
    { word: "clavicle",           hint1: "Bone",      hint2: "Collar bone" },
    { word: "humerus",            hint1: "Bone",      hint2: "Upper arm bone" },
    { word: "trapezius",          hint1: "Muscle",    hint2: "Back and neck muscle" },
    { word: "deltoid",            hint1: "Muscle",    hint2: "Shoulder muscle" },
    { word: "pectoralis",         hint1: "Muscle",    hint2: "Chest muscle" },
    { word: "gastrocnemius",      hint1: "Muscle",    hint2: "Calf muscle" },
    { word: "quadriceps",         hint1: "Muscle",    hint2: "Anterior thigh group" },
    { word: "patella",            hint1: "Bone",      hint2: "Knee cap" },
    { word: "calcaneus",          hint1: "Bone",      hint2: "Heel bone" },
    { word: "femoral",            hint1: "Artery",    hint2: "Thigh artery" },
    { word: "brachial",           hint1: "Artery",    hint2: "Upper arm artery" },
    { word: "sciatic",            hint1: "Nerve",     hint2: "Largest nerve in the body" },
    { word: "ulnar",              hint1: "Nerve",     hint2: "Medial forearm nerve" },
    { word: "tibialis",           hint1: "Muscle",    hint2: "Lower leg muscle" },
    { word: "metatarsal",         hint1: "Bone",      hint2: "Foot bone" },
    { word: "sustentaculum tali", hint1: "Bone",      hint2: "Shelf on the calcaneus" },
    { word: "pes anserinus",      hint1: "Structure", hint2: "Medial knee tendon insertion" },
    { word: "piriformis",         hint1: "Muscle",    hint2: "Deep hip external rotator" },
    { word: "coracobrachialis",   hint1: "Muscle",    hint2: "Upper arm muscle" },
    { word: "popliteus",          hint1: "Muscle",    hint2: "Posterior knee muscle" },
    { word: "semitendinosus",     hint1: "Muscle",    hint2: "Posterior thigh hamstring" },
    { word: "semimembranosus",    hint1: "Muscle",    hint2: "Posterior thigh hamstring" },
    { word: "xiphoid",            hint1: "Bone",      hint2: "Inferior tip of the sternum" },
    { word: "acetabulum",         hint1: "Bone",      hint2: "Hip socket in the pelvis" },
    { word: "manubrium",          hint1: "Bone",      hint2: "Superior sternum segment" },
    { word: "coccyx",             hint1: "Bone",      hint2: "Tailbone" },
    { word: "navicular",          hint1: "Bone",      hint2: "Medial foot bone" },
    { word: "sartorius",          hint1: "Muscle",    hint2: "Longest muscle in the body" },
    { word: "brachioradialis",    hint1: "Muscle",    hint2: "Forearm flexor muscle" },
    { word: "supraspinatus",      hint1: "Muscle",    hint2: "Rotator cuff muscle" },
    { word: "musculocutaneous",   hint1: "Nerve",     hint2: "Anterior arm nerve" },
    { word: "obturator",          hint1: "Nerve",     hint2: "Medial thigh nerve" },
    { word: "subclavian",         hint1: "Artery",    hint2: "Under the clavicle artery" },
    { word: "rhomboid",           hint1: "Muscle",    hint2: "Scapular retractor muscle" },
    { word: "iliopsoas",          hint1: "Muscle",    hint2: "Primary hip flexor" },
    { word: "ischium",            hint1: "Bone",      hint2: "Inferior hip bone" },
    { word: "trochanter",         hint1: "Bone",      hint2: "Femur bony projection" },
    { word: "infraspinatus",      hint1: "Muscle",    hint2: "Posterior rotator cuff" },
    { word: "aponeurosis",        hint1: "Structure", hint2: "Flat tendon sheet" },
    { word: "scapula",            hint1: "Bone",      hint2: "Posterior shoulder blade" },
    { word: "radius",             hint1: "Bone",      hint2: "Lateral forearm bone" },
    { word: "ulna",               hint1: "Bone",      hint2: "Medial forearm bone" },
    { word: "tibia",              hint1: "Bone",      hint2: "Medial lower leg bone" },
    { word: "fibula",             hint1: "Bone",      hint2: "Lateral lower leg bone" },
    { word: "sacrum",             hint1: "Bone",      hint2: "Posterior pelvic bone" },
    { word: "ilium",              hint1: "Bone",      hint2: "Superior hip bone" },
    { word: "talus",              hint1: "Bone",      hint2: "Ankle bone" },
    { word: "soleus",             hint1: "Muscle",    hint2: "Deep calf muscle" },
    { word: "gracilis",           hint1: "Muscle",    hint2: "Medial thigh adductor" },
    { word: "rectus femoris",     hint1: "Muscle",    hint2: "Anterior quadriceps muscle" },
    { word: "gluteus maximus",    hint1: "Muscle",    hint2: "Largest gluteal muscle" },
    { word: "gluteus medius",     hint1: "Muscle",    hint2: "Hip abductor muscle" },
    { word: "vastus lateralis",   hint1: "Muscle",    hint2: "Lateral quadriceps" },
    { word: "vastus medialis",    hint1: "Muscle",    hint2: "Medial quadriceps" },
    { word: "biceps femoris",     hint1: "Muscle",    hint2: "Lateral hamstring" },
    { word: "adductor longus",    hint1: "Muscle",    hint2: "Medial thigh muscle" },
    { word: "subscapularis",      hint1: "Muscle",    hint2: "Anterior rotator cuff" },
    { word: "teres minor",        hint1: "Muscle",    hint2: "Rotator cuff muscle" },
    { word: "pronator teres",     hint1: "Muscle",    hint2: "Forearm pronator muscle" },
    { word: "sternocleidomastoid",hint1: "Muscle",    hint2: "Neck rotation muscle" },
    { word: "popliteal",          hint1: "Artery",    hint2: "Behind the knee artery" },
    { word: "radial",             hint1: "Artery",    hint2: "Lateral forearm artery" },
    { word: "tibial",             hint1: "Nerve",     hint2: "Posterior leg nerve" },
    { word: "axillary",           hint1: "Nerve",     hint2: "Shoulder region nerve" },
    { word: "plantaris",          hint1: "Muscle",    hint2: "Thin posterior leg muscle" },
  ];

  const TOTAL_ROUNDS = 5;
  const ROUND_TIME   = 30;
  const CIRCUMFERENCE = 2 * Math.PI * 43; // ≈ 270.2

  const g = {
    p1: "Player 1", p2: "Player 2",
    mode: 2,
    totalRounds: 5,
    scores: [0, 0],
    round: 0,
    timeLeft: ROUND_TIME,
    interval: null,
    queue: [],
    current: null,
    active: false,
    roundStartTime: null,
    times: [],
  };

  function selectMode(mode) {
    g.mode = mode;
    document.getElementById('btn-solo').classList.toggle('selected', mode === 1);
    document.getElementById('btn-vs').classList.toggle('selected', mode === 2);
    document.getElementById('name-fields').style.display = mode === 2 ? 'flex' : 'none';
    document.getElementById('round-selector').classList.add('show');
    document.getElementById('btn-start').style.display = 'block';
  }

  function selectRounds(n) {
    g.totalRounds = n === 0 ? Infinity : n;
    ['btn-r3','btn-r5','btn-rendless'].forEach(id => document.getElementById(id).classList.remove('selected'));
    const map = { 3:'btn-r3', 5:'btn-r5', 0:'btn-rendless' };
    document.getElementById(map[n]).classList.add('selected');
  }

  // ── Helpers ────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function scramblePart(word) {
    const arr = word.split('');
    // Keep shuffling until it's different (prevents trivial unscramble)
    let attempts = 0;
    do {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      attempts++;
    } while (arr.join('') === word && attempts < 20 && word.length > 1);
    return arr.join('');
  }

  function scrambleWord(word) {
    return word.split(' ').map(scramblePart).join(' ');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Game control ───────────────────────────────────────────
  function startGame() {
    const fo = document.getElementById('fade-overlay');
    fo.classList.add('fading');

    setTimeout(() => {
      const solo = g.mode === 1;
      g.p1 = solo ? 'Player' : (document.getElementById('p1-input').value.trim() || 'Player 1');
      g.p2 = solo ? '' : (document.getElementById('p2-input').value.trim() || 'Player 2');
      g.scores = [0, 0];
      g.round  = 0;
      g.times  = [];
      g.queue  = g.totalRounds === Infinity
        ? shuffle(WORDS)
        : shuffle(WORDS).slice(0, g.totalRounds);

      // Scoreboard
      document.getElementById('g-p1-name').textContent = g.p1;
      document.getElementById('g-p2-name').textContent = g.p2;
      document.getElementById('g-round').textContent = g.totalRounds === Infinity ? 'Round 1' : `Round 1 / ${g.totalRounds}`;

      // Show/hide p2 column and button
      const p2Col = document.getElementById('g-p2-name').closest('.player-col');
      p2Col.style.visibility = solo ? 'hidden' : 'visible';
      document.getElementById('btn-p2').style.display = solo ? 'none' : '';
      document.getElementById('btn-p1-label').textContent = solo ? 'Got it' : g.p1 + '  got it';
      document.getElementById('btn-p2-label').textContent = g.p2 + '  got it';

      hideIntro();
      showScreen('game-screen');
      nextRound();

      fo.classList.remove('fading');
    }, 500);
  }

  function nextRound() {
    if (g.round >= g.queue.length) { showResults(); return; }

    g.current  = g.queue[g.round];
    g.round++;
    g.timeLeft = ROUND_TIME;
    g.active   = true;

    // Scores + round
    document.getElementById('g-p1-pts').textContent = g.scores[0];
    document.getElementById('g-p2-pts').textContent = g.scores[1];
    document.getElementById('g-round').textContent = g.totalRounds === Infinity
      ? `Round ${g.round}` : `Round ${g.round} / ${g.totalRounds}`;
    g.roundStartTime = Date.now();

    // Word
    const scrambledEl = document.getElementById('scrambled-word');
    scrambledEl.style.opacity = '1';
    scrambledEl.textContent = scrambleWord(g.current.word).toUpperCase();

    // Hide answer reveal
    const revealEl = document.getElementById('answer-reveal');
    revealEl.classList.remove('show', 'missed');
    revealEl.textContent = '';

    // Hint — hidden for first 10 seconds
    const hintEl = document.getElementById('hint');
    hintEl.className = 'hint-text';
    hintEl.textContent = '';

    // Timer ring reset
    setRing(ROUND_TIME);

    // Buttons reset
    resetButtons();

    clearInterval(g.interval);
    g.interval = setInterval(tick, 1000);
  }

  function tick() {
    g.timeLeft--;
    setRing(g.timeLeft);
    document.getElementById('timer-num').textContent = g.timeLeft;

    // At 20s remaining (10s elapsed) → show vague hint
    if (g.timeLeft === 20) {
      const hintEl = document.getElementById('hint');
      hintEl.textContent = g.current.hint1;
      hintEl.className = 'hint-text flash';
      hintEl.addEventListener('animationend', () => hintEl.classList.add('show'), { once: true });
      playHintSound(false);
    }

    // At 10s remaining (20s elapsed) → swap to specific hint
    if (g.timeLeft === 10) {
      const hintEl = document.getElementById('hint');
      hintEl.className = 'hint-text';
      setTimeout(() => {
        hintEl.textContent = g.current.hint2;
        hintEl.className = 'hint-text specific flash';
        hintEl.addEventListener('animationend', () => hintEl.classList.add('show'), { once: true });
        playHintSound(true);
      }, 200);
    }

    if (g.timeLeft <= 0) {
      clearInterval(g.interval);
      g.active = false;
      disableButtons();
      revealAnswer(false);
      playBuzzer();
      setTimeout(afterRound, 1800);
    }
  }

  function setRing(t) {
    const ring = document.getElementById('ring');
    const pct  = t / ROUND_TIME;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);

    if (t > 15)     ring.style.stroke = 'var(--text)';
    else if (t > 8) ring.style.stroke = 'var(--warn)';
    else            ring.style.stroke = 'var(--danger)';
  }

  function revealAnswer(correct) {
    document.getElementById('scrambled-word').style.opacity = '0';
    const revealEl = document.getElementById('answer-reveal');
    revealEl.textContent = g.current.word.toUpperCase();
    revealEl.className = 'answer-reveal' + (correct ? '' : ' missed');
    requestAnimationFrame(() => requestAnimationFrame(() => revealEl.classList.add('show')));
  }

  function award(player) {
    if (!g.active) return;
    clearInterval(g.interval);
    g.active = false;
    g.scores[player - 1]++;
    if (g.roundStartTime) g.times.push((Date.now() - g.roundStartTime) / 1000);

    const btn = document.getElementById(player === 1 ? 'btn-p1' : 'btn-p2');
    btn.classList.add('correct');
    disableButtons();

    revealAnswer(true);
    flashGreen();
    playCorrect();
    setTimeout(afterRound, 1400);
  }

  function skip() {
    if (!g.active) return;
    clearInterval(g.interval);
    g.active = false;
    disableButtons();
    revealAnswer(false);
    setTimeout(afterRound, 1400);
  }

  function afterRound() {
    if (g.round >= g.queue.length) { showResults(); return; }
    nextRound();
  }

  function disableButtons() {
    ['btn-p1','btn-p2','btn-skip'].forEach(id => {
      document.getElementById(id).disabled = true;
    });
  }

  function resetButtons() {
    ['btn-p1','btn-p2'].forEach(id => {
      const b = document.getElementById(id);
      b.className = 'btn-point';
      b.disabled = false;
    });
    document.getElementById('btn-skip').disabled = false;
  }

  // ── Results ────────────────────────────────────────────────
  function showResults() {
    const solo    = g.mode === 1;
    const total   = g.queue.length;
    const avgTime = g.times.length
      ? (g.times.reduce((a,b) => a+b, 0) / g.times.length).toFixed(1)
      : null;

    document.getElementById('final-scores-vs').style.display   = solo ? 'none' : '';
    document.getElementById('final-scores-solo').style.display = solo ? 'flex' : 'none';

    if (solo) {
      document.getElementById('res-label').textContent    = 'Your score';
      document.getElementById('res-winner').textContent   = `${g.scores[0]} / ${total}`;
      document.getElementById('res-solo-pts').textContent = g.scores[0];
    } else {
      document.getElementById('res-p1-name').textContent = g.p1;
      document.getElementById('res-p2-name').textContent = g.p2;
      document.getElementById('res-p1-pts').textContent  = g.scores[0];
      document.getElementById('res-p2-pts').textContent  = g.scores[1];

      let label, winner;
      if (g.scores[0] > g.scores[1])      { label = 'Winner'; winner = g.p1; }
      else if (g.scores[1] > g.scores[0]) { label = 'Winner'; winner = g.p2; }
      else                                 { label = "It's a"; winner = 'Tie'; }

      document.getElementById('res-label').textContent  = label;
      document.getElementById('res-winner').textContent = winner;
    }

    const speedEl = document.getElementById('speed-stat');
    if (avgTime) {
      document.getElementById('speed-val').textContent = avgTime;
      speedEl.style.display = 'block';
    } else {
      speedEl.style.display = 'none';
    }

    showScreen('result-screen');
  }

  function resetGame() {
    const fo = document.getElementById('fade-overlay');
    fo.classList.add('fading');

    setTimeout(() => {
      document.getElementById('p1-input').value = '';
      document.getElementById('p2-input').value = '';
      document.getElementById('btn-solo').classList.remove('selected');
      document.getElementById('btn-vs').classList.remove('selected');
      document.getElementById('round-selector').classList.remove('show');
      document.getElementById('name-fields').style.display = 'none';
      document.getElementById('btn-start').style.display   = 'none';
      showScreen('setup-screen');
      playIntro();

      fo.classList.remove('fading');
    }, 500);
  }

  // ── Flash ──────────────────────────────────────────────────
  function flashGreen() {
    const el = document.getElementById('flash');
    el.classList.remove('go');
    void el.offsetWidth; // reflow
    el.classList.add('go');
  }

  // ── Audio ──────────────────────────────────────────────────
  let audioCtx;
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playHintSound(specific) {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;

      if (!specific) {
        // Hint 1 — playful upward "boing" with a wobble
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(320, now);
        osc.frequency.exponentialRampToValueAtTime(640, now + 0.12);
        osc.frequency.exponentialRampToValueAtTime(520, now + 0.22);
        osc.frequency.exponentialRampToValueAtTime(580, now + 0.32);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.28, now + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.42);
        osc.start(now); osc.stop(now + 0.45);

        // Little sparkle on top
        const osc2  = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2); gain2.connect(ctx.destination);
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(1200, now + 0.1);
        osc2.frequency.exponentialRampToValueAtTime(1800, now + 0.22);
        gain2.gain.setValueAtTime(0, now + 0.1);
        gain2.gain.linearRampToValueAtTime(0.12, now + 0.14);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
        osc2.start(now + 0.1); osc2.stop(now + 0.35);
      } else {
        // Hint 2 — more dramatic: ascending three-note fanfare
        const notes = [440, 587, 880];
        notes.forEach((freq, i) => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + i * 0.1);
          osc.frequency.exponentialRampToValueAtTime(freq * 1.08, now + i * 0.1 + 0.12);
          gain.gain.setValueAtTime(0, now + i * 0.1);
          gain.gain.linearRampToValueAtTime(0.22, now + i * 0.1 + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.22);
          osc.start(now + i * 0.1);
          osc.stop(now + i * 0.1 + 0.25);
        });

        // Shimmer tail
        const shimmer  = ctx.createOscillator();
        const sGain    = ctx.createGain();
        shimmer.connect(sGain); sGain.connect(ctx.destination);
        shimmer.type = 'sine';
        shimmer.frequency.setValueAtTime(1760, now + 0.28);
        shimmer.frequency.exponentialRampToValueAtTime(2200, now + 0.5);
        sGain.gain.setValueAtTime(0.1, now + 0.28);
        sGain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
        shimmer.start(now + 0.28); shimmer.stop(now + 0.6);
      }
    } catch(e) {}
  }

  function playBuzzer() {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;

      // Low descending buzz
      [0, 0.22, 0.44].forEach((delay, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200 - i * 30, now + delay);
        osc.frequency.linearRampToValueAtTime(80, now + delay + 0.18);
        gain.gain.setValueAtTime(0.35, now + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.22);
        osc.start(now + delay);
        osc.stop(now + delay + 0.25);
      });
    } catch(e) {}
  }

  function playCorrect() {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;
      const freqs = [523.25, 659.25, 783.99]; // C5 E5 G5

      freqs.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = now + i * 0.11;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.22, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
        osc.start(t);
        osc.stop(t + 0.3);
      });
    } catch(e) {}
  }

  // ── Intro animation ───────────────────────────────────────
  const INTRO_COLORS = ['#ff6b6b','#ff9f43','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff6b6b','#ff9f43','#ffd93d','#6bcb77'];
  let introLooping = false;

  function playIntro() {
    const overlay  = document.getElementById('intro-overlay');
    const wordWrap = document.getElementById('intro-word-wrap');
    const sub      = document.getElementById('intro-sub');
    introLooping = true;
    wordWrap.innerHTML = '';
    sub.classList.remove('show');
    overlay.classList.add('visible');

    const word = 'UNSCRAMBLE';
    word.split('').forEach((char, i) => {
      const el = document.createElement('span');
      el.className = 'intro-letter';
      el.textContent = char;
      el.style.color = INTRO_COLORS[i % INTRO_COLORS.length];
      el.style.textShadow = `0 0 40px ${INTRO_COLORS[i % INTRO_COLORS.length]}88`;
      el.style.animationDelay = `${i * 0.06}s`;
      wordWrap.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('animate')));
    });

    // After all letters have appeared, scramble
    const allAppeared = word.length * 60 + 350;
    setTimeout(() => scrambleAndReturn(sub), allAppeared);
  }

  function scrambleAndReturn(sub) {
    const els = Array.from(document.querySelectorAll('.intro-letter'));

    // Freeze letters in place (cancel drop-in animation)
    els.forEach(el => {
      el.style.animation = 'none';
      el.style.opacity   = '1';
      el.style.transform = 'none';
    });

    // Subtitle fades out during scramble
    sub.classList.remove('show');

    requestAnimationFrame(() => {
      // Capture current positions
      const rects = els.map(el => el.getBoundingClientRect());

      // Build a shuffled permutation (guarantee it's different from identity)
      const order = els.map((_, i) => i);
      do {
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
      } while (order.every((v, i) => v === i));

      // Scramble — each letter jumps to a different letter's position
      els.forEach((el, i) => {
        const dx  = rects[order[i]].left - rects[i].left;
        const rot = (Math.random() - 0.5) * 30;
        el.style.transition = `transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1)`;
        el.style.transform  = `translateX(${dx}px) rotate(${rot}deg)`;
      });

      // Unscramble back after a beat
      setTimeout(() => {
        els.forEach(el => {
          el.style.transition = `transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)`;
          el.style.transform  = 'translateX(0) rotate(0deg)';
        });

        // Subtitle fades back in, then loop again
        setTimeout(() => sub.classList.add('show'), 300);
        setTimeout(() => { if (introLooping) scrambleAndReturn(sub); }, 3000);
      }, 900);
    });
  }

  function hideIntro() {
    introLooping = false;
    document.getElementById('intro-overlay').classList.remove('visible');
  }

  // ── Photo with results ─────────────────────────────────────
  let _photoStream = null;

  function openPhoto() {
    const solo    = g.mode === 1;
    const total   = g.queue.length;
    const avgTime = g.times.length
      ? (g.times.reduce((a,b)=>a+b,0)/g.times.length).toFixed(1) : null;

    // Build overlay text
    let html = `<div class="photo-label">Anatomy Unscramble</div>`;
    if (solo) {
      html += `<div class="photo-winner">${g.scores[0]} / ${total}</div>`;
    } else {
      const winner = g.scores[0] > g.scores[1] ? g.p1
                   : g.scores[1] > g.scores[0] ? g.p2 : 'Tie';
      html += `<div class="photo-winner">${winner}</div>`;
      html += `<div class="photo-scores">${g.p1} &nbsp;${g.scores[0]} – ${g.scores[1]}&nbsp; ${g.p2}</div>`;
    }
    if (avgTime) html += `<div class="photo-speed">Avg. ${avgTime}s per answer</div>`;
    document.getElementById('photo-results-overlay').innerHTML = html;

    const modal = document.getElementById('photo-modal');
    const video = document.getElementById('photo-video');
    modal.classList.add('visible');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
      .then(stream => {
        _photoStream = stream;
        video.srcObject = stream;
      })
      .catch(() => alert('Camera not available on this device.'));
  }

  function closePhoto() {
    document.getElementById('photo-modal').classList.remove('visible');
    if (_photoStream) { _photoStream.getTracks().forEach(t => t.stop()); _photoStream = null; }
  }

  function capturePhoto() {
    const video = document.getElementById('photo-video');
    const vw = video.videoWidth  || 1280;
    const vh = video.videoHeight || 720;
    const canvas = document.createElement('canvas');
    canvas.width = vw; canvas.height = vh;
    const ctx = canvas.getContext('2d');

    // Mirror (selfie)
    ctx.translate(vw, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);
    ctx.setTransform(1,0,0,1,0,0);

    // Gradient overlay
    const gradY = vh * 0.5;
    const grad  = ctx.createLinearGradient(0, gradY, 0, vh);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.35, 'rgba(0,0,0,0.82)');
    grad.addColorStop(1,    'rgba(0,0,0,0.95)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, gradY, vw, vh - gradY);

    // Text helpers
    const cx = vw / 2;
    ctx.textAlign = 'center';

    // Label
    const solo   = g.mode === 1;
    const total  = g.queue.length;
    const avgT   = g.times.length ? (g.times.reduce((a,b)=>a+b,0)/g.times.length).toFixed(1) : null;

    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = `${vw*0.032}px -apple-system,sans-serif`;
    ctx.fillText('ANATOMY UNSCRAMBLE', cx, vh * 0.68);

    ctx.fillStyle = '#fff';
    ctx.font = `800 ${vw*0.13}px -apple-system,sans-serif`;
    if (solo) {
      ctx.fillText(`${g.scores[0]} / ${total}`, cx, vh * 0.82);
    } else {
      const winner = g.scores[0]>g.scores[1]?g.p1:g.scores[1]>g.scores[0]?g.p2:'Tie';
      ctx.fillText(winner.toUpperCase(), cx, vh * 0.80);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = `${vw*0.04}px -apple-system,sans-serif`;
      ctx.fillText(`${g.p1}  ${g.scores[0]} – ${g.scores[1]}  ${g.p2}`, cx, vh * 0.88);
    }

    if (avgT) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = `${vw*0.028}px -apple-system,sans-serif`;
      ctx.fillText(`avg. ${avgT}s per answer`, cx, vh * 0.95);
    }

    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `unscramble-result-${Date.now()}.png`;
    a.click();
  }

  // ── Screen recording ───────────────────────────────────────
  let mediaRecorder = null;
  let recordChunks  = [];

  async function toggleRecord() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: {
          frameRate: { ideal: 60, max: 60 },
          width:     { ideal: 1920 },
          height:    { ideal: 1080 },
        },
        audio: true,
      });

      recordChunks  = [];
      mediaRecorder = new MediaRecorder(stream, {
        mimeType:        getSupportedMime(),
        videoBitsPerSecond: 16_000_000,  // 16 Mbps
        audioBitsPerSecond:    192_000,  // 192 kbps
      });

      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        // Stop all tracks so the browser indicator goes away
        stream.getTracks().forEach(t => t.stop());

        const blob = new Blob(recordChunks, { type: mediaRecorder.mimeType });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const ext  = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
        a.href     = url;
        a.download = `anatomy-unscramble-${Date.now()}.${ext}`;
        a.click();
        URL.revokeObjectURL(url);

        setRecordUI(false);
        mediaRecorder = null;
      };

      // If user closes the share dialog natively, treat as stop
      stream.getVideoTracks()[0].onended = () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      };

      mediaRecorder.start();
      setRecordUI(true);
    } catch (e) {
      // User cancelled the dialog — do nothing
    }
  }

  function setRecordUI(recording) {
    const btn   = document.getElementById('record-btn');
    const label = document.getElementById('record-label');
    btn.classList.toggle('recording', recording);
    label.textContent = recording ? 'Stop' : 'Record';
  }

  function getSupportedMime() {
    const types = [
      'video/mp4;codecs=avc1',          // H.264 MP4 (best compat)
      'video/webm;codecs=vp9',          // VP9 WebM (high quality)
      'video/webm;codecs=h264',         // H.264 WebM
      'video/mp4',
      'video/webm',
    ];
    return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  }

  // Auto-play intro on load (it's the home screen background)
  window.addEventListener('load', () => playIntro());
</script>
</body>
