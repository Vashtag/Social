<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anatomy Unscramble</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #242424;
      --text: #f0ece4;
      --muted: #555;
      --hint1: #777;
      --hint2: #c8c0b4;
      --correct-bg: #0f2010;
      --correct-border: #2a5c2a;
      --correct-text: #74d874;
      --warn: #d4a84b;
      --danger: #c95454;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Screens ── */
    .screen {
      display: none;
      min-height: 100dvh;
      width: 100%;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .screen.active { display: flex; }

    /* ── Setup ── */
    #setup-screen { flex-direction: column; }

    .setup-inner {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .logo {
      text-align: center;
    }
    .logo-title {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .logo-sub {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .fields {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .field-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      color: var(--text);
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #444; }
    input[type="text"]::placeholder { color: #3a3a3a; }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Game ── */
    #game-screen { flex-direction: column; align-items: stretch; padding: 0; }

    .game-inner {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1.5rem 1.5rem;
      gap: 0;
    }

    /* Scoreboard */
    .scoreboard {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.5rem;
      flex-shrink: 0;
    }

    .player-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      min-width: 80px;
    }
    .player-col .name {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .player-col .pts {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
    }

    .center-col {
      text-align: center;
    }
    .round-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    /* Word area */
    .word-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 0;
    }

    /* Timer ring */
    .timer-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      flex-shrink: 0;
    }
    .timer-wrap svg {
      width: 96px;
      height: 96px;
      transform: rotate(-90deg);
    }
    .ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 5;
    }
    .ring-fg {
      fill: none;
      stroke: var(--text);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 271;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.9s linear, stroke 0.4s ease;
    }
    .timer-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    /* Scrambled word */
    .scrambled {
      font-size: clamp(2.2rem, 9vw, 4.2rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 1.15;
      word-break: break-word;
    }

    /* Hint */
    .hint-area {
      height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint-text {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0;
      padding: 0.4rem 1.1rem;
      border-radius: 100px;
      position: relative;
      background: var(--bg);
      z-index: 0;
    }
    .hint-text.show { opacity: 1; }
    .hint-text.specific { color: var(--text); }

    /* Soft colour-shifting glow under the text */
    @keyframes hint-glow {
      0%   { text-shadow: 0 2px 10px rgba(150, 200, 255, 0.5); }
      33%  { text-shadow: 0 2px 12px rgba(200, 150, 255, 0.5); }
      66%  { text-shadow: 0 2px 12px rgba(255, 200, 120, 0.5); }
      100% { text-shadow: 0 2px 10px rgba(150, 200, 255, 0.5); }
    }

    /* Appear animation */
    @keyframes hint-appear {
      0%   { opacity: 0; transform: scale(0.88); }
      55%  { opacity: 1; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }

    .hint-text.flash {
      animation: hint-appear 0.4s ease-out forwards,
                 hint-glow 3s ease-in-out 0.4s infinite;
    }

    /* Buttons */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      flex-shrink: 0;
    }

    .btn-point {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.05rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }
    .btn-point:hover { background: #1e1e1e; border-color: #333; }
    .btn-point:active { transform: scale(0.985); }
    .btn-point.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      color: var(--correct-text);
    }
    .btn-point:disabled { opacity: 0.35; cursor: default; }

    .btn-skip {
      background: transparent;
      color: var(--muted);
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 0.7rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-skip:hover { color: #888; border-color: #333; }
    .btn-skip:disabled { opacity: 0.2; cursor: default; }

    /* ── Result ── */
    #result-screen { flex-direction: column; }

    .result-inner {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      text-align: center;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .result-winner {
      font-size: clamp(2.2rem, 8vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .final-scores {
      display: flex;
      gap: 4rem;
    }
    .final-player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .final-player .fname {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .final-player .fpts {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
    }

    .divider {
      width: 1px;
      height: 60px;
      background: var(--border);
      align-self: center;
    }

    /* Answer reveal */
    .answer-reveal {
      font-size: clamp(2.2rem, 9vw, 4.2rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.15;
      word-break: break-word;
      color: var(--correct-text);
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 0.3s ease, transform 0.3s ease;
      position: absolute;
      width: 100%;
      pointer-events: none;
    }
    .answer-reveal.show {
      opacity: 1;
      transform: scale(1);
    }
    .answer-reveal.missed {
      color: var(--danger);
    }
    .word-slot {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: clamp(2.8rem, 10vw, 5rem);
      width: 100%;
    }

    /* Preview overlay */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .preview-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .preview-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .preview-words {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .preview-word {
      font-size: clamp(1.6rem, 6vw, 2.8rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .preview-word.show {
      opacity: 1;
      transform: translateY(0);
    }
    .countdown-num {
      font-size: 6rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .countdown-num.show {
      opacity: 1;
      transform: scale(1);
    }
    .countdown-num.hide {
      opacity: 0;
      transform: scale(1.3);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* Pulse on correct */
    @keyframes correct-pulse {
      0% { opacity: 0.12; }
      50% { opacity: 0.22; }
      100% { opacity: 0; }
    }
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: #4caf50;
      pointer-events: none;
      opacity: 0;
      border-radius: 0;
    }
    .flash-overlay.go {
      animation: correct-pulse 0.5s ease-out forwards;
    }
    /* Record button */
    .record-btn {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 100;
    }

    /* Intro button */
    .intro-btn {
      position: fixed;
      bottom: 1.25rem;
      left: 1.25rem;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.55rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }
    .intro-btn:hover { border-color: #444; color: var(--text); }

    /* Intro backdrop (covers full screen behind the frame) */
    .intro-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 499;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .intro-backdrop.visible { opacity: 1; pointer-events: all; }

    /* Intro overlay — portrait 9:16 frame centered on screen */
    .intro-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Fill height, constrain width to 9:16 ratio */
      height: min(100vh, 100dvh);
      width: min(calc(100vh * 9 / 16), 100vw);
      aspect-ratio: 9 / 16;
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      overflow: hidden;
    }
    .intro-overlay.visible { opacity: 1; pointer-events: all; }

    .intro-bg-gradient {
      position: absolute;
      inset: 0;
      background: #080808;
      z-index: 0;
    }

    .intro-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orb-drift 4s ease-in-out infinite alternate;
    }
    @keyframes orb-drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -20px) scale(1.15); }
    }

    .intro-word-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 0;
    }
    .intro-letter {
      display: inline-block;
      /* font sized to fit 10 chars across ~9/16 of viewport height */
      font-size: clamp(1.8rem, min(8vw, 4.5vh), 5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.01em;
      opacity: 0;
    }
    .intro-letter.animate {
      animation: letter-full 1.1s ease-out forwards;
    }
    @keyframes letter-full {
      0%   { opacity: 0; transform: translateY(-70px) scale(0.4) rotate(-8deg); }
      20%  { opacity: 1; transform: translateY(6px)  scale(1.1)  rotate(1deg);  }
      30%  { transform: translateY(-5px) scale(0.97); }
      38%  { transform: translateY(0)    scale(1);    }
      52%  { transform: translateY(-13px); }
      66%  { transform: translateY(0);     }
      78%  { transform: translateY(-9px);  }
      90%  { transform: translateY(0);     }
      100% { opacity: 1; transform: translateY(0); }
    }

    .intro-sub {
      position: relative;
      z-index: 1;
      font-size: clamp(0.7rem, 2.5vw, 0.95rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .intro-sub.show { opacity: 1; transform: translateY(0); }


    .record-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.55rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .record-btn:hover { border-color: #444; color: var(--text); }
    .record-btn.recording {
      border-color: var(--danger);
      color: var(--danger);
      background: #1a0a0a;
    }
    .record-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .record-btn.recording .record-dot {
      background: var(--danger);
      animation: rec-pulse 1.1s ease-in-out infinite;
    }
    @keyframes rec-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>
<body>

<!-- Flash overlay -->
<div class="flash-overlay" id="flash"></div>

<!-- Intro backdrop -->
<div class="intro-backdrop" id="intro-backdrop"></div>

<!-- Intro overlay -->
<div class="intro-overlay" id="intro-overlay">
  <div class="intro-bg-gradient">
    <div class="intro-orb" style="width:420px;height:420px;background:#7c3aed;opacity:0.35;top:-80px;left:-100px;animation-delay:0s;"></div>
    <div class="intro-orb" style="width:360px;height:360px;background:#db2777;opacity:0.3;bottom:-60px;right:-80px;animation-delay:-1.5s;"></div>
    <div class="intro-orb" style="width:280px;height:280px;background:#0ea5e9;opacity:0.25;bottom:20%;left:30%;animation-delay:-0.8s;animation-duration:5s;"></div>
    <div class="intro-orb" style="width:200px;height:200px;background:#f59e0b;opacity:0.2;top:15%;right:20%;animation-delay:-2s;animation-duration:3.5s;"></div>
  </div>
  <div class="intro-word-wrap" id="intro-word-wrap"></div>
  <div class="intro-sub" id="intro-sub">Anatomy Edition</div>
</div>

<!-- Preview overlay -->
<div class="preview-overlay" id="preview-overlay">
  <div class="preview-label" id="preview-label">Answers this round</div>
  <div class="preview-words" id="preview-words"></div>
  <div class="countdown-num" id="countdown-num"></div>
</div>

<!-- Intro button (always visible) -->
<button class="intro-btn" onclick="playIntro()">✦ Intro</button>

<!-- Record button (always visible) -->
<button class="record-btn" id="record-btn" onclick="toggleRecord()">
  <div class="record-dot"></div>
  <span id="record-label">Record</span>
</button>

<!-- ── Setup Screen ── -->
<div class="screen active" id="setup-screen">
  <div class="setup-inner">
    <div class="logo">
      <div class="logo-title">Unscramble</div>
      <div class="logo-sub">Anatomy Edition &nbsp;·&nbsp; KIN 100</div>
    </div>

    <div class="fields">
      <div>
        <div class="field-label">Player 1</div>
        <input type="text" id="p1-input" placeholder="Enter name" maxlength="18" autocomplete="off" />
      </div>
      <div>
        <div class="field-label">Player 2</div>
        <input type="text" id="p2-input" placeholder="Enter name" maxlength="18" autocomplete="off" />
      </div>
    </div>

    <button class="btn-primary" onclick="startGame()">Start Game</button>
  </div>
</div>

<!-- ── Game Screen ── -->
<div class="screen" id="game-screen">
  <div class="game-inner">

    <div class="scoreboard">
      <div class="player-col">
        <div class="name" id="g-p1-name">P1</div>
        <div class="pts" id="g-p1-pts">0</div>
      </div>
      <div class="center-col">
        <div class="round-badge" id="g-round">Round 1 / 3</div>
      </div>
      <div class="player-col">
        <div class="name" id="g-p2-name">P2</div>
        <div class="pts" id="g-p2-pts">0</div>
      </div>
    </div>

    <div class="word-area">
      <div class="timer-wrap">
        <svg viewBox="0 0 96 96">
          <circle class="ring-bg" cx="48" cy="48" r="43" />
          <circle class="ring-fg" id="ring" cx="48" cy="48" r="43" />
        </svg>
        <div class="timer-num" id="timer-num">30</div>
      </div>

      <div class="word-slot">
        <div class="scrambled" id="scrambled-word">—</div>
        <div class="answer-reveal" id="answer-reveal"></div>
      </div>

      <div class="hint-area">
        <div class="hint-text" id="hint">—</div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-point" id="btn-p1" onclick="award(1)">
        <span id="btn-p1-label">P1 got it</span>
      </button>
      <button class="btn-point" id="btn-p2" onclick="award(2)">
        <span id="btn-p2-label">P2 got it</span>
      </button>
      <button class="btn-skip" id="btn-skip" onclick="skip()">Skip</button>
    </div>

  </div>
</div>

<!-- ── Result Screen ── -->
<div class="screen" id="result-screen">
  <div class="result-inner">
    <div>
      <div class="result-label" id="res-label">Winner</div>
      <div class="result-winner" id="res-winner">—</div>
    </div>

    <div class="final-scores">
      <div class="final-player">
        <div class="fname" id="res-p1-name">P1</div>
        <div class="fpts" id="res-p1-pts">0</div>
      </div>
      <div class="divider"></div>
      <div class="final-player">
        <div class="fname" id="res-p2-name">P2</div>
        <div class="fpts" id="res-p2-pts">0</div>
      </div>
    </div>

    <button class="btn-primary" onclick="resetGame()">Play Again</button>
  </div>
</div>

<script>
  // ── Word bank ──────────────────────────────────────────────
  const WORDS = [
    { word: "coracoid",           hint1: "Bone",      hint2: "Upper limb bone process" },
    { word: "acromion",           hint1: "Bone",      hint2: "Scapula landmark" },
    { word: "olecranon",          hint1: "Bone",      hint2: "Posterior elbow process" },
    { word: "clavicle",           hint1: "Bone",      hint2: "Collar bone" },

    { word: "deltoid",            hint1: "Muscle",    hint2: "Shoulder muscle" },

    { word: "quadriceps",         hint1: "Muscle",    hint2: "Anterior thigh group" },
    { word: "patella",            hint1: "Bone",      hint2: "Knee cap" },
    { word: "calcaneus",          hint1: "Bone",      hint2: "Heel bone" },
    { word: "femoral",            hint1: "Artery",    hint2: "Thigh artery" },
    { word: "brachial",           hint1: "Artery",    hint2: "Upper arm artery" },
    { word: "sciatic",            hint1: "Nerve",     hint2: "Largest nerve in the body" },
    { word: "ulnar",              hint1: "Nerve",     hint2: "Medial forearm nerve" },
    { word: "tibialis",           hint1: "Muscle",    hint2: "Lower leg muscle" },
    { word: "metatarsal",         hint1: "Bone",      hint2: "Foot bone" },
    { word: "sustentaculum tali", hint1: "Bone",      hint2: "Shelf on the calcaneus" },
    { word: "pes anserinus",      hint1: "Structure", hint2: "Medial knee tendon insertion" },
    { word: "piriformis",         hint1: "Muscle",    hint2: "Deep hip external rotator" },
    { word: "coracobrachialis",   hint1: "Muscle",    hint2: "Upper arm muscle" },
    { word: "popliteus",          hint1: "Muscle",    hint2: "Posterior knee muscle" },
    { word: "semitendinosus",     hint1: "Muscle",    hint2: "Posterior thigh hamstring" },
    { word: "semimembranosus",    hint1: "Muscle",    hint2: "Posterior thigh hamstring" },
    { word: "xiphoid",            hint1: "Bone",      hint2: "Inferior tip of the sternum" },
    { word: "acetabulum",         hint1: "Bone",      hint2: "Hip socket in the pelvis" },
    { word: "manubrium",          hint1: "Bone",      hint2: "Superior sternum segment" },
    { word: "coccyx",             hint1: "Bone",      hint2: "Tailbone" },
    { word: "navicular",          hint1: "Bone",      hint2: "Medial foot bone" },
    { word: "sartorius",          hint1: "Muscle",    hint2: "Longest muscle in the body" },
    { word: "brachioradialis",    hint1: "Muscle",    hint2: "Forearm flexor muscle" },
    { word: "supraspinatus",      hint1: "Muscle",    hint2: "Rotator cuff muscle" },
    { word: "musculocutaneous",   hint1: "Nerve",     hint2: "Anterior arm nerve" },
    { word: "obturator",          hint1: "Nerve",     hint2: "Medial thigh nerve" },
    { word: "subclavian",         hint1: "Artery",    hint2: "Under the clavicle artery" },
    { word: "rhomboid",           hint1: "Muscle",    hint2: "Scapular retractor muscle" },
    { word: "iliopsoas",          hint1: "Muscle",    hint2: "Primary hip flexor" },
    { word: "ischium",            hint1: "Bone",      hint2: "Inferior hip bone" },
    { word: "trochanter",         hint1: "Bone",      hint2: "Femur bony projection" },
    { word: "infraspinatus",      hint1: "Muscle",    hint2: "Posterior rotator cuff" },
    { word: "aponeurosis",        hint1: "Structure", hint2: "Flat tendon sheet" },
  ];

  const TOTAL_ROUNDS = 3;
  const ROUND_TIME   = 30;
  const CIRCUMFERENCE = 2 * Math.PI * 43; // ≈ 270.2

  const g = {
    p1: "Player 1", p2: "Player 2",
    scores: [0, 0],
    round: 0,
    timeLeft: ROUND_TIME,
    interval: null,
    queue: [],
    current: null,
    active: false,
  };

  // ── Helpers ────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function scramblePart(word) {
    const arr = word.split('');
    // Keep shuffling until it's different (prevents trivial unscramble)
    let attempts = 0;
    do {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      attempts++;
    } while (arr.join('') === word && attempts < 20 && word.length > 1);
    return arr.join('');
  }

  function scrambleWord(word) {
    return word.split(' ').map(scramblePart).join(' ');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Game control ───────────────────────────────────────────
  function startGame() {
    g.p1 = document.getElementById('p1-input').value.trim() || 'Player 1';
    g.p2 = document.getElementById('p2-input').value.trim() || 'Player 2';
    g.scores = [0, 0];
    g.round = 0;
    g.queue = shuffle(WORDS).slice(0, TOTAL_ROUNDS);

    document.getElementById('g-p1-name').textContent = g.p1;
    document.getElementById('g-p2-name').textContent = g.p2;
    document.getElementById('btn-p1-label').textContent = g.p1 + '  got it';
    document.getElementById('btn-p2-label').textContent = g.p2 + '  got it';

    showScreen('game-screen');
    showPreview();
  }

  function showPreview() {
    const overlay   = document.getElementById('preview-overlay');
    const wordsEl   = document.getElementById('preview-words');
    const labelEl   = document.getElementById('preview-label');
    const countEl   = document.getElementById('countdown-num');

    // Build word list
    wordsEl.innerHTML = '';
    countEl.className = 'countdown-num';
    countEl.textContent = '';
    labelEl.style.opacity = '1';

    g.queue.forEach(item => {
      const div = document.createElement('div');
      div.className = 'preview-word';
      div.textContent = item.word.toUpperCase();
      wordsEl.appendChild(div);
    });

    // Show overlay
    overlay.classList.add('visible');

    // Stagger word appearances
    const wordEls = wordsEl.querySelectorAll('.preview-word');
    wordEls.forEach((el, i) => {
      setTimeout(() => el.classList.add('show'), 150 + i * 200);
    });

    // After 2.5s fade out the words and label, then countdown
    setTimeout(() => {
      wordEls.forEach(el => { el.style.opacity = '0'; el.style.transform = 'translateY(-6px)'; });
      labelEl.style.opacity = '0';

      setTimeout(() => startCountdown(overlay), 400);
    }, 2500);
  }

  function startCountdown(overlay) {
    const countEl = document.getElementById('countdown-num');
    const nums = [3, 2, 1];
    let i = 0;

    function showNum() {
      if (i >= nums.length) {
        overlay.classList.remove('visible');
        setTimeout(nextRound, 300);
        return;
      }
      countEl.textContent = nums[i];
      countEl.className = 'countdown-num show';
      setTimeout(() => {
        countEl.className = 'countdown-num hide';
        setTimeout(() => { i++; showNum(); }, 220);
      }, 700);
    }

    showNum();
  }

  function nextRound() {
    if (g.round >= TOTAL_ROUNDS) { showResults(); return; }

    g.current  = g.queue[g.round];
    g.round++;
    g.timeLeft = ROUND_TIME;
    g.active   = true;

    // Scores + round
    document.getElementById('g-p1-pts').textContent = g.scores[0];
    document.getElementById('g-p2-pts').textContent = g.scores[1];
    document.getElementById('g-round').textContent  = `Round ${g.round} / ${TOTAL_ROUNDS}`;

    // Word
    const scrambledEl = document.getElementById('scrambled-word');
    scrambledEl.style.opacity = '1';
    scrambledEl.textContent = scrambleWord(g.current.word).toUpperCase();

    // Hide answer reveal
    const revealEl = document.getElementById('answer-reveal');
    revealEl.classList.remove('show', 'missed');
    revealEl.textContent = '';

    // Hint — hidden for first 10 seconds
    const hintEl = document.getElementById('hint');
    hintEl.className = 'hint-text';
    hintEl.textContent = '';

    // Timer ring reset
    setRing(ROUND_TIME);

    // Buttons reset
    resetButtons();

    clearInterval(g.interval);
    g.interval = setInterval(tick, 1000);
  }

  function tick() {
    g.timeLeft--;
    setRing(g.timeLeft);
    document.getElementById('timer-num').textContent = g.timeLeft;

    // At 20s remaining (10s elapsed) → show vague hint
    if (g.timeLeft === 20) {
      const hintEl = document.getElementById('hint');
      hintEl.textContent = g.current.hint1;
      hintEl.className = 'hint-text flash';
      hintEl.addEventListener('animationend', () => hintEl.classList.add('show'), { once: true });
      playHintSound(false);
    }

    // At 10s remaining (20s elapsed) → swap to specific hint
    if (g.timeLeft === 10) {
      const hintEl = document.getElementById('hint');
      hintEl.className = 'hint-text';
      setTimeout(() => {
        hintEl.textContent = g.current.hint2;
        hintEl.className = 'hint-text specific flash';
        hintEl.addEventListener('animationend', () => hintEl.classList.add('show'), { once: true });
        playHintSound(true);
      }, 200);
    }

    if (g.timeLeft <= 0) {
      clearInterval(g.interval);
      g.active = false;
      disableButtons();
      revealAnswer(false);
      playBuzzer();
      setTimeout(afterRound, 1800);
    }
  }

  function setRing(t) {
    const ring = document.getElementById('ring');
    const pct  = t / ROUND_TIME;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);

    if (t > 15)     ring.style.stroke = 'var(--text)';
    else if (t > 8) ring.style.stroke = 'var(--warn)';
    else            ring.style.stroke = 'var(--danger)';
  }

  function revealAnswer(correct) {
    document.getElementById('scrambled-word').style.opacity = '0';
    const revealEl = document.getElementById('answer-reveal');
    revealEl.textContent = g.current.word.toUpperCase();
    revealEl.className = 'answer-reveal' + (correct ? '' : ' missed');
    requestAnimationFrame(() => requestAnimationFrame(() => revealEl.classList.add('show')));
  }

  function award(player) {
    if (!g.active) return;
    clearInterval(g.interval);
    g.active = false;
    g.scores[player - 1]++;

    const btn = document.getElementById(player === 1 ? 'btn-p1' : 'btn-p2');
    btn.classList.add('correct');
    disableButtons();

    revealAnswer(true);
    flashGreen();
    playCorrect();
    setTimeout(afterRound, 1400);
  }

  function skip() {
    if (!g.active) return;
    clearInterval(g.interval);
    g.active = false;
    disableButtons();
    revealAnswer(false);
    setTimeout(afterRound, 1400);
  }

  function afterRound() {
    if (g.round >= TOTAL_ROUNDS) { showResults(); return; }
    nextRound();
  }

  function disableButtons() {
    ['btn-p1','btn-p2','btn-skip'].forEach(id => {
      document.getElementById(id).disabled = true;
    });
  }

  function resetButtons() {
    ['btn-p1','btn-p2'].forEach(id => {
      const b = document.getElementById(id);
      b.className = 'btn-point';
      b.disabled = false;
    });
    document.getElementById('btn-skip').disabled = false;
  }

  // ── Results ────────────────────────────────────────────────
  function showResults() {
    document.getElementById('res-p1-name').textContent = g.p1;
    document.getElementById('res-p2-name').textContent = g.p2;
    document.getElementById('res-p1-pts').textContent  = g.scores[0];
    document.getElementById('res-p2-pts').textContent  = g.scores[1];

    let label, winner;
    if (g.scores[0] > g.scores[1])      { label = 'Winner'; winner = g.p1; }
    else if (g.scores[1] > g.scores[0]) { label = 'Winner'; winner = g.p2; }
    else                                 { label = "It's a"; winner = 'Tie'; }

    document.getElementById('res-label').textContent  = label;
    document.getElementById('res-winner').textContent = winner;
    showScreen('result-screen');
  }

  function resetGame() {
    document.getElementById('p1-input').value = '';
    document.getElementById('p2-input').value = '';
    showScreen('setup-screen');
  }

  // ── Flash ──────────────────────────────────────────────────
  function flashGreen() {
    const el = document.getElementById('flash');
    el.classList.remove('go');
    void el.offsetWidth; // reflow
    el.classList.add('go');
  }

  // ── Audio ──────────────────────────────────────────────────
  let audioCtx;
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playHintSound(specific) {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;

      if (!specific) {
        // Hint 1 — playful upward "boing" with a wobble
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(320, now);
        osc.frequency.exponentialRampToValueAtTime(640, now + 0.12);
        osc.frequency.exponentialRampToValueAtTime(520, now + 0.22);
        osc.frequency.exponentialRampToValueAtTime(580, now + 0.32);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.28, now + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.42);
        osc.start(now); osc.stop(now + 0.45);

        // Little sparkle on top
        const osc2  = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2); gain2.connect(ctx.destination);
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(1200, now + 0.1);
        osc2.frequency.exponentialRampToValueAtTime(1800, now + 0.22);
        gain2.gain.setValueAtTime(0, now + 0.1);
        gain2.gain.linearRampToValueAtTime(0.12, now + 0.14);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
        osc2.start(now + 0.1); osc2.stop(now + 0.35);
      } else {
        // Hint 2 — more dramatic: ascending three-note fanfare
        const notes = [440, 587, 880];
        notes.forEach((freq, i) => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + i * 0.1);
          osc.frequency.exponentialRampToValueAtTime(freq * 1.08, now + i * 0.1 + 0.12);
          gain.gain.setValueAtTime(0, now + i * 0.1);
          gain.gain.linearRampToValueAtTime(0.22, now + i * 0.1 + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.22);
          osc.start(now + i * 0.1);
          osc.stop(now + i * 0.1 + 0.25);
        });

        // Shimmer tail
        const shimmer  = ctx.createOscillator();
        const sGain    = ctx.createGain();
        shimmer.connect(sGain); sGain.connect(ctx.destination);
        shimmer.type = 'sine';
        shimmer.frequency.setValueAtTime(1760, now + 0.28);
        shimmer.frequency.exponentialRampToValueAtTime(2200, now + 0.5);
        sGain.gain.setValueAtTime(0.1, now + 0.28);
        sGain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
        shimmer.start(now + 0.28); shimmer.stop(now + 0.6);
      }
    } catch(e) {}
  }

  function playBuzzer() {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;

      // Low descending buzz
      [0, 0.22, 0.44].forEach((delay, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200 - i * 30, now + delay);
        osc.frequency.linearRampToValueAtTime(80, now + delay + 0.18);
        gain.gain.setValueAtTime(0.35, now + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.22);
        osc.start(now + delay);
        osc.stop(now + delay + 0.25);
      });
    } catch(e) {}
  }

  function playCorrect() {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;
      const freqs = [523.25, 659.25, 783.99]; // C5 E5 G5

      freqs.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = now + i * 0.11;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.22, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
        osc.start(t);
        osc.stop(t + 0.3);
      });
    } catch(e) {}
  }

  // ── Intro animation ───────────────────────────────────────
  const INTRO_COLORS = ['#ff6b6b','#ff9f43','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff6b6b','#ff9f43','#ffd93d','#6bcb77'];
  let introReady = false;

  function playIntro() {
    const overlay  = document.getElementById('intro-overlay');
    const wordWrap = document.getElementById('intro-word-wrap');
    const sub      = document.getElementById('intro-sub');
    introReady = false;
    wordWrap.innerHTML = '';
    sub.classList.remove('show');
    overlay.classList.add('visible');
    document.getElementById('intro-backdrop').classList.add('visible');

    const word = 'UNSCRAMBLE';
    word.split('').forEach((char, i) => {
      const el = document.createElement('span');
      el.className = 'intro-letter';
      el.textContent = char;
      el.style.color = INTRO_COLORS[i % INTRO_COLORS.length];
      el.style.textShadow = `0 0 40px ${INTRO_COLORS[i % INTRO_COLORS.length]}88`;
      el.style.animationDelay = `${i * 0.07}s`;
      wordWrap.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('animate')));
    });

    // After all letters have landed, do scramble → unscramble
    const allLanded = word.length * 70 + 1200;
    setTimeout(() => scrambleAndReturn(sub), allLanded);
  }

  function scrambleAndReturn(sub) {
    const els = Array.from(document.querySelectorAll('.intro-letter'));

    // Freeze letters in place (cancel drop-in animation)
    els.forEach(el => {
      el.style.animation = 'none';
      el.style.opacity   = '1';
      el.style.transform = 'none';
    });

    // Subtitle fades out during scramble
    sub.classList.remove('show');

    requestAnimationFrame(() => {
      // Capture current positions
      const rects = els.map(el => el.getBoundingClientRect());

      // Build a shuffled permutation (guarantee it's different from identity)
      const order = els.map((_, i) => i);
      do {
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
      } while (order.every((v, i) => v === i));

      // Scramble — each letter jumps to a different letter's position
      els.forEach((el, i) => {
        const dx  = rects[order[i]].left - rects[i].left;
        const rot = (Math.random() - 0.5) * 30;
        el.style.transition = `transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1)`;
        el.style.transform  = `translateX(${dx}px) rotate(${rot}deg)`;
      });

      // Unscramble back after a beat
      setTimeout(() => {
        els.forEach(el => {
          el.style.transition = `transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)`;
          el.style.transform  = 'translateX(0) rotate(0deg)';
        });

        // Subtitle fades back in, then ready
        setTimeout(() => sub.classList.add('show'), 300);
        setTimeout(() => { introReady = true; }, 900);
      }, 900);
    });
  }

  function hideIntro() {
    if (!introReady) return;
    document.getElementById('intro-overlay').classList.remove('visible');
    document.getElementById('intro-backdrop').classList.remove('visible');
  }

  // Enter key dismisses
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') hideIntro();
  });

  // Tap dismisses (mobile)
  document.getElementById('intro-overlay').addEventListener('click', hideIntro);

  // ── Screen recording ───────────────────────────────────────
  let mediaRecorder = null;
  let recordChunks  = [];

  async function toggleRecord() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: 30 },
        audio: true,
      });

      recordChunks  = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMime() });

      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        // Stop all tracks so the browser indicator goes away
        stream.getTracks().forEach(t => t.stop());

        const blob = new Blob(recordChunks, { type: mediaRecorder.mimeType });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const ext  = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
        a.href     = url;
        a.download = `anatomy-unscramble-${Date.now()}.${ext}`;
        a.click();
        URL.revokeObjectURL(url);

        setRecordUI(false);
        mediaRecorder = null;
      };

      // If user closes the share dialog natively, treat as stop
      stream.getVideoTracks()[0].onended = () => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      };

      mediaRecorder.start();
      setRecordUI(true);
    } catch (e) {
      // User cancelled the dialog — do nothing
    }
  }

  function setRecordUI(recording) {
    const btn   = document.getElementById('record-btn');
    const label = document.getElementById('record-label');
    btn.classList.toggle('recording', recording);
    label.textContent = recording ? 'Stop' : 'Record';
  }

  function getSupportedMime() {
    const types = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm'];
    return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  }
